# k6 Performance Gate
#
# Runs a k6 smoke test on every pull request and blocks the merge if there is
# a performance regression against a baseline that is versioned in the repo.
#
# Flow:
#   1. Install k6 and k6-compare
#   2. Run the script -> produces summary.json (via handleSummary)
#   3. k6-compare baseline.json summary.json -> exit 3 if there is a regression
#
# The baseline (examples/compare-demo/baseline.json) is updated manually via a
# PR when a performance change is expected and accepted. Versioning it in git
# makes that "this is the new normal" decision explicit and reviewable.
#
# Exit codes produced by k6-compare:
#   0 = no regression      -> workflow passes -> PR can merge
#   3 = regression detected -> workflow fails  -> PR blocked
#   5 = load-model mismatch -> workflow fails  -> add --force or --assume-* flags
#   1 = parse/IO error      -> workflow fails  -> check summary file paths

name: k6 Performance Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  load-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1.2.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install k6-compare
        run: go install github.com/jwcastillo/k6-compare@latest

      - name: Run load test
        # smoke.js writes summary.json into the working dir via handleSummary
        run: k6 run examples/scripts/smoke.js
        env:
          TARGET_URL: ${{ vars.TARGET_URL || 'https://test.k6.io' }}

      - name: Compare against baseline
        run: |
          k6-compare \
            examples/compare-demo/baseline.json \
            summary.json \
            --threshold-p99 10 \
            --threshold-p999 15 \
            --threshold-error-rate 50 \
            --threshold-rps 10

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: summary.json
          retention-days: 30
